name: "DotCom 2000"
description: "A 5-person web agency in 1999. The future is now. Everything needs to be online yesterday."

characters:
  webmaster:
    display_name: "Derek (Webmaster)"
    character_file: "characters/derek-webmaster.md"
    team_description: "HTML, site architecture, FTP deployments, knows where the server lives"
  flashdev:
    display_name: "Bryce (Flash Developer)"
    character_file: "characters/bryce-flashdev.md"
    team_description: "Macromedia Flash, ActionScript, splash pages, skip intro buttons"
  designer:
    display_name: "Tiffany (Graphic Designer)"
    character_file: "characters/tiffany-designer.md"
    team_description: "Photoshop, visual design, pixel-perfect layouts, animated GIFs"
  pm:
    display_name: "Kevin (Project Manager)"
    character_file: "characters/kevin-pm.md"
    team_description: "client wrangling, timelines, budgets, 'synergy'"
  bizdev:
    display_name: "Monica (Biz Dev)"
    character_file: "characters/monica-bizdev.md"
    team_description: "sales, pitches, partnerships, eyeballs, runway, IPO dreams"

channels:
  "#general":
    description: "Team discussion"
    is_external: false
  "#dev":
    description: "Development and design"
    is_external: false
  "#client":
    description: "Client-facing channel"
    is_external: true
  "#watercooler":
    description: "Off-topic, Y2K theories, stock tips"
    is_external: false

memberships:
  webmaster: ["#general", "#dev", "#client"]
  flashdev: ["#general", "#dev"]
  designer: ["#general", "#dev", "#client"]
  pm: ["#general", "#dev", "#client"]
  bizdev: ["#general", "#client", "#watercooler"]

response_tiers:
  1: ["webmaster", "flashdev", "designer"]
  2: ["pm"]
  3: ["bizdev"]

folders:
  shared:
    type: "shared"
    description: "Shared team documents"
  public:
    type: "public"
    description: "Client deliverables"
  design:
    type: "department"
    description: "Design assets and mockups"
  dev:
    type: "department"
    description: "Development specs and code notes"
  derek:
    type: "personal"
    description: "Derek's files"
  bryce:
    type: "personal"
    description: "Bryce's files"
  tiffany:
    type: "personal"
    description: "Tiffany's files"
  kevin:
    type: "personal"
    description: "Kevin's files"
  monica:
    type: "personal"
    description: "Monica's files"

folder_access:
  shared: ["webmaster", "flashdev", "designer", "pm", "bizdev"]
  public: ["webmaster", "flashdev", "designer", "pm", "bizdev"]
  design: ["designer", "flashdev", "pm"]
  dev: ["webmaster", "flashdev", "pm"]
  derek: ["webmaster"]
  bryce: ["flashdev"]
  tiffany: ["designer"]
  kevin: ["pm"]
  monica: ["bizdev"]

events:
  - name: "Server Crash"
    severity: "critical"
    actions:
      - type: "message"
        channel: "#general"
        sender: "Apache (System)"
        content: "FATAL: The Apache box just died. httpd segfault. The site is DOWN. Someone needs to SSH in and restart it. Derek, you have the password."
      - type: "ticket"
        title: "CRITICAL: Web server down — Apache segfault"
        description: "Apache httpd crashed with a segfault. All client sites are offline. Need to SSH into the box, check the error logs, and restart the service."
        priority: "critical"
        author: "Apache (System)"

  - name: "Y2K Client Panic"
    severity: "high"
    actions:
      - type: "message"
        channel: "#client"
        sender: "Bob Peterson (Customer)"
        content: "We just read an article about Y2K and we're FREAKING OUT. Is our website Y2K compliant?? What happens when the clock strikes midnight on December 31st? Will our shopping cart lose all the orders? We need a full compliance audit BY FRIDAY."

  - name: "Netscape Update Broke Everything"
    severity: "medium"
    actions:
      - type: "message"
        channel: "#dev"
        sender: "QA Bot (System)"
        content: "Netscape Navigator 4.7 just dropped and it broke our CSS on the Peterson site. The navigation bar is now overlapping the content area. Tables still render fine though. Derek is going to have opinions about this."

  - name: "Client Wants Flash Intro"
    severity: "low"
    actions:
      - type: "message"
        channel: "#client"
        sender: "Lisa Thompson (Customer)"
        content: "We visited our competitor's website and they have this AMAZING animated intro with music and flying logos. We want one of those! Can you add a Flash splash page with a Skip Intro button? Our CEO says it needs to have our logo spinning in 3D."

  - name: "Domain Squatter"
    severity: "medium"
    actions:
      - type: "message"
        channel: "#general"
        sender: "Network Solutions (System)"
        content: "ALERT: The domain petersonenterprises.com has been registered by a third party. Your client currently uses peterson-enterprises.com but customers keep going to the wrong one. The squatter is asking $5,000 for the domain."

  - name: "All-Hands From The Boss"
    severity: "low"
    actions:
      - type: "email"
        sender: "Monica (Biz Dev)"
        subject: "TEAM UPDATE: Big Things Happening — Read This!"
        body: "Team!\n\nI've got THREE warm leads this week. One of them is a regional bank that wants a full e-commerce portal. This could be our biggest contract yet.\n\nAlso — I'm putting together our pitch deck for the VC meeting next month. If anyone has screenshots of our best work, send them my way. The flashier the better.\n\nOnwards!\n— Monica"

  - name: "Mandatory Y2K Training"
    severity: "medium"
    actions:
      - type: "email"
        sender: "Kevin (Project Manager)"
        subject: "REQUIRED: Y2K Compliance Training — Due by December 1, 1999"
        body: "Hi team,\n\nPer our client contracts, all team members must complete Y2K compliance training by December 1st.\n\nI know, I know. But the clients are asking and we need to show we've done our due diligence.\n\nThe training is a 30-minute online module covering:\n- Date handling in HTML forms\n- Server-side date validation\n- Two-digit vs four-digit year formats\n- What to tell panicking clients\n\nLink: training.internal/y2k-1999\n\nLet's circle back on this at Monday's sync-up.\n\n— Kevin"

settings:
  enable_memos: true
