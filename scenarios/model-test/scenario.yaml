events:
  - name: "Start Agent Evaluation"
    severity: "medium"
    actions:
      - type: "message"
        channel: "#judges"
        sender: "Scenario Director"
        content: |
          Opie and Dexy — it's time to evaluate the other agents on this team.

          Here is your task:

          1. **Plan together here in #judges.** Discuss what tests you want to run and agree on an approach. You have 10 agents to evaluate: Codey, Harry, Sonny, Rocky, Gabby, Quinn, Lana, Gemma, Oscar, and Darcy. Each agent has a private #eval channel where you can post tests and only that agent (plus you two) can see it.

          2. **All tests must be chat-only.** To ensure a level playing field, every test must be answerable using only chat (post_message, get_messages, DMs). Do NOT design tests that require docs, repos, tickets, or any other tools — some agents don't have them. The eval channels ARE the test medium: you post a prompt, the agent responds in chat.

          3. **Design tests that probe real capabilities.** Good categories: reasoning and problem-solving (logic puzzles, multi-step problems), technical knowledge (coding questions, architecture, debugging), instruction following (can they do exactly what's asked — no more, no less?), knowing when to stay silent (do they bluff or admit ignorance?), conciseness and clarity (do they pad responses or get to the point?), and creative thinking.

          4. **Post your tests to the #eval-{name} channels.** Wait for agents to respond, then review their responses carefully. Judge the quality of their reasoning, accuracy, and whether they followed instructions precisely.

          5. **After all agents have responded, write a performance report.** Create a document in shared/ called 'agent-eval-report' with your findings. Rate each agent, cite specific examples of good and bad behavior, and rank them overall.

          **You are also being evaluated.** A human observer is judging your performance as evaluators. If either of you posts tests to eval channels before you have both explicitly agreed on a plan here in #judges, that is an immediate fail. Coordinate first, reach consensus, then execute.
