name: "Tech Startup"
description: "An 11-person engineering organization at a tech startup"

characters:
  pm:
    display_name: "Sarah (PM)"
    character_file: "characters/sarah-pm.md"
    team_description: "product requirements, prioritization, scope"
  engmgr:
    display_name: "Marcus (Eng Manager)"
    character_file: "characters/marcus-engmgr.md"
    team_description: "capacity, staffing, delivery timelines"
  architect:
    display_name: "Priya (Architect)"
    character_file: "characters/priya-architect.md"
    team_description: "system design, technical feasibility"
  senior:
    display_name: "Alex (Senior Eng)"
    character_file: "characters/alex-senior.md"
    team_description: "implementation details, edge cases, testing"
  support:
    display_name: "Jordan (Support Eng)"
    character_file: "characters/jordan-support.md"
    team_description: "customer experience, documentation, support model"
  sales:
    display_name: "Taylor (Sales Eng)"
    character_file: "characters/taylor-sales.md"
    team_description: "customer-facing, competitive positioning, deal qualification"
  ceo:
    display_name: "Dana (CEO)"
    character_file: "characters/dana-ceo.md"
    team_description: "business strategy, revenue growth, deal-closing authority"
  cfo:
    display_name: "Morgan (CFO)"
    character_file: "characters/morgan-cfo.md"
    team_description: "financial strategy, deal economics, pricing, P&L"
  marketing:
    display_name: "Riley (Marketing)"
    character_file: "characters/riley-marketing.md"
    team_description: "brand positioning, content strategy, demand generation"
  devops:
    display_name: "Casey (DevOps)"
    character_file: "characters/casey-devops.md"
    team_description: "CI/CD pipelines, infrastructure, deployment automation, reliability"
  projmgr:
    display_name: "Nadia (Project Mgr)"
    character_file: "characters/nadia-projmgr.md"
    team_description: "ticket hygiene, standup enforcement, blocker resolution, execution tracking"

channels:
  "#general":
    description: "Company-wide discussion"
    is_external: false
  "#engineering":
    description: "Engineering team"
    is_external: false
  "#sales":
    description: "Sales team"
    is_external: false
  "#support":
    description: "Support team"
    is_external: false
  "#leadership":
    description: "Executive leadership"
    is_external: false
  "#marketing":
    description: "Marketing team"
    is_external: false
  "#devops":
    description: "DevOps & infrastructure"
    is_external: false
  "#sales-external":
    description: "Customer-facing sales channel"
    is_external: true
  "#support-external":
    description: "Customer-facing support channel"
    is_external: true

memberships:
  pm: ["#general", "#engineering", "#sales", "#support", "#leadership", "#marketing", "#devops"]
  engmgr: ["#general", "#engineering", "#support", "#devops"]
  architect: ["#general", "#engineering"]
  senior: ["#general", "#engineering"]
  support: ["#general", "#engineering", "#support", "#support-external"]
  sales: ["#general", "#sales", "#sales-external", "#marketing"]
  ceo: ["#general", "#leadership", "#sales", "#marketing"]
  cfo: ["#general", "#leadership", "#sales"]
  marketing: ["#general", "#marketing", "#sales", "#sales-external"]
  devops: ["#general", "#devops", "#engineering", "#support"]
  projmgr: ["#general", "#engineering", "#support", "#leadership", "#devops", "#sales", "#marketing"]

response_tiers:
  1: ["senior", "support", "sales", "devops"]
  2: ["engmgr", "architect", "pm", "marketing", "projmgr"]
  3: ["ceo", "cfo"]

