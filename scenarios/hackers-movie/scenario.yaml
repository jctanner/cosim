channels:
  "#general":
    description: "Crew-wide discussion"
    is_external: false
  "#hacking":
    description: "Technical hacking discussion — exploits, targets, tools"
    is_external: false
  "#recon":
    description: "Reconnaissance and intelligence gathering"
    is_external: false
  "#the-outside":
    description: "Signals, clues, and fragments from the world outside the Gibson"
    is_external: true

memberships:
  crash: ["#general", "#hacking", "#recon", "#announcements", "#the-outside"]
  burn: ["#general", "#hacking", "#recon", "#announcements", "#the-outside"]
  phreak: ["#general", "#hacking", "#recon", "#announcements"]
  cereal: ["#general", "#hacking", "#recon", "#announcements"]
  joey: ["#general", "#hacking", "#recon", "#announcements"]
  nikon: ["#general", "#hacking", "#recon", "#announcements"]

response_tiers:
  1: ["crash", "burn", "phreak", "cereal", "joey", "nikon"]

folders:
  shared:
    type: "shared"
    description: "Shared crew files"
  logs:
    type: "department"
    description: "System logs and artifacts found inside the Gibson"
  dade:
    type: "personal"
    description: "Dade's private notes"
  kate:
    type: "personal"
    description: "Kate's private notes"
  ramon:
    type: "personal"
    description: "Phreak's private notes"
  emmanuel:
    type: "personal"
