name: "Company Simulator Team"
description: "A 2-person team building the company-simulator itself. Recursive vibes."

characters:
  maintainer:
    display_name: "T4NN3R (Maintainer)"
    character_file: "characters/t4nn3r-maintainer.md"
    team_description: "project creator, architecture decisions, vision, code review"
  collaborator:
    display_name: "1.z3r0 (Collaborator)"
    character_file: "characters/1z3r0-collaborator.md"
    team_description: "feature implementation, UX ideas, testing, vibe coding"

channels:
  "#general":
    description: "Main discussion"
    is_external: false
  "#dev":
    description: "Development work and code discussion"
    is_external: false
  "#ideas":
    description: "Feature ideas and brainstorming"
    is_external: false
  "#bugs":
    description: "Bug reports and fixes"
    is_external: false

memberships:
  maintainer: ["#general", "#dev", "#ideas", "#bugs"]
  collaborator: ["#general", "#dev", "#ideas", "#bugs"]

response_tiers:
  1: ["maintainer", "collaborator"]

folders:
  shared:
    type: "shared"
    description: "Shared project documents"
  public:
    type: "public"
    description: "Public-facing docs"
  dev:
    type: "department"
    description: "Development notes and specs"
  tanner:
    type: "personal"
    description: "Tanner's notes"
  acp:
    type: "personal"
    description: "ACP's notes"

folder_access:
  shared: ["maintainer", "collaborator"]
  public: ["maintainer", "collaborator"]
  dev: ["maintainer", "collaborator"]
  tanner: ["maintainer"]
  acp: ["collaborator"]

events:
  - name: "SDK Breaking Change"
    severity: "high"
    actions:
      - type: "message"
        channel: "#dev"
        sender: "Dependabot (System)"
        content: "claude-agent-sdk v0.2.0 released with BREAKING CHANGES. The ClaudeSDKClient constructor signature changed. Our AgentPool initialization will fail on upgrade. Migration guide: https://docs.anthropic.com/sdk/migration"
      - type: "ticket"
        title: "SDK upgrade: claude-agent-sdk v0.2.0 breaking changes"
        description: "New SDK version changes ClaudeSDKClient constructor. Need to update AgentPool and agent_runner.py before upgrading."
        priority: "high"
        author: "Dependabot (System)"

  - name: "Context Window Exceeded"
    severity: "critical"
    actions:
      - type: "message"
        channel: "#bugs"
        sender: "Error Monitor (System)"
        content: "ALERT: Agent 'Sarah (PM)' hit context window limit during response generation. The prompt is too large — chat history + docs + tickets exceeds the model's token limit. Agents may start losing context or failing silently."

  - name: "PR Review Requested"
    severity: "low"
    actions:
      - type: "message"
        channel: "#dev"
        sender: "GitHub (System)"
        content: "T4NN3R requested a review from 1.z3r0 on PR #42: 'Add event system with scenario-defined event pools'. 6 files changed, +450 -20."

  - name: "UI Bug Report"
    severity: "medium"
    actions:
      - type: "message"
        channel: "#bugs"
        sender: "Beta Tester (User)"
        content: "Bug report: The NPC page cards are overlapping on mobile viewport widths. Also the 'Being Fired' status dot animation is causing layout jank in Firefox. Screenshots attached (not really, imagine them)."
      - type: "ticket"
        title: "UI Bug: NPC cards overlap on mobile + Firefox animation jank"
        description: "1. NPC cards overlap below 768px viewport width\n2. 'Being Fired' CSS animation causes layout jank in Firefox\n\nPriority: medium — desktop works fine, mobile is stretch goal"
        priority: "medium"
        author: "Beta Tester (User)"

  - name: "Mandatory Security Training"
    severity: "medium"
    actions:
      - type: "email"
        sender: "InfoSec (System)"
        subject: "REQUIRED: Security Best Practices Training — Due by April 15"
        body: "Team,\n\nAnnual security training is now available. Topics include:\n- API key management (don't commit .env files)\n- Dependency vulnerability scanning\n- Secure session handling\n- The irony of simulating a company that handles security training\n\nDeadline: April 15, 2026\n\nLink: training.internal/security-2026\n\n— InfoSec"

  - name: "Project Milestone Update"
    severity: "low"
    actions:
      - type: "email"
        sender: "T4NN3R (Maintainer)"
        subject: "CoSim v0.3 — What We Shipped This Week"
        body: "1.z3r0,\n\nQuick recap of what landed this week:\n- Events system with multi-action bundles\n- Hire/fire with hot add/remove\n- Per-agent verbosity control\n- Agent thoughts search\n- 8 character templates\n\nThe orchestrator is getting fragile with the hot add/remove stuff. We should probably talk about the subprocess-per-agent rearchitecture before we add more lifecycle complexity.\n\nAlso the agents keep dropping raw JSON in chat. The parser fix helps but it's not bulletproof.\n\n— T4NN3R"

  - name: "Remote Work Equipment Stipend"
    severity: "low"
    actions:
      - type: "email"
        sender: "HR (System)"
        subject: "Remote Work Policy & Equipment Stipend — You're Set Up for Success"
        body: "Team,\n\nQuick reminder: we're a remote-first company. Work from wherever you do your best work.\n\nTo make sure everyone has what they need, we're offering an annual equipment stipend of $2,500. This covers:\n\n- Monitors, keyboards, mice, docks\n- Webcams and microphones\n- Headsets (noise-cancelling encouraged)\n- Ring lights, boom arms, and streaming/rigging gear\n- Standing desks or ergonomic chairs\n- Anything else that makes your setup better\n\nNo approval needed — just submit receipts through Expensify. If you need something above the stipend, talk to your manager.\n\nWe want you comfortable, productive, and looking good on camera (or not — cameras optional, always).\n\n— HR"
