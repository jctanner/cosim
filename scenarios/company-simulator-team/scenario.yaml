- name: 'RFC: Orchestrator Rearchitecture'
  severity: medium
  actions:
  - type: memo
    title: 'RFC: Subprocess-Per-Agent Orchestrator Rearchitecture'
    sender: T4NN3R (Maintainer)
    description: Discussion thread for the orchestrator rearchitecture proposal
    text: 'The current orchestrator is getting fragile. Every _close_session() poisons subsequent awaits via anyio cancel scope leaks. Hot add/remove works but requires try/except everywhere plus auto-restart.


      Proposal: move to subprocess-per-agent. Each agent runs in its own process with its own event loop. Hire spawns a process, fire kills one. No cross-contamination.


      Alternatives:

      1. One-shot sessions (higher latency)

      2. SDK fix upstream (waiting on Anthropic)

      3. Clean lifecycle separation (bandaid)


      Thoughts?'
  - type: message
    channel: '#dev'
    sender: T4NN3R (Maintainer)
    content: Posted an RFC on the memo-list about the orchestrator rearchitecture. Would love your thoughts — the cancel scope leaks are getting worse with every new feature.
- name: 'RFC 2324: HTCPCP (Coffee Pot Protocol)'
  severity: low
  actions:
  - type: memo
    title: 'RFC 2324: Hyper Text Coffee Pot Control Protocol'
    sender: 1.z3r0 (Collaborator)
    description: Proposal to implement HTCPCP for agent caffeine management
    text: 'Team, I''ve been reading through the IETF archives and I think we''re missing a critical protocol.


      RFC 2324 defines HTCPCP — the Hyper Text Coffee Pot Control Protocol. Key features:

      - BREW method for initiating coffee

      - New HTTP error code: 418 I''m a teapot

      - Content-Type: application/coffee-pot-command

      - milk-type header (whole, skim, cream, half-and-half)


      I''m proposing we add HTCPCP support to CoSim. Our agents are working long hours and deserve programmatic access to caffeine. The 418 status code alone is worth the implementation.


      Considerations:

      - Do we need separate endpoints for decaf?

      - Should the CEO have priority brew access?

      - What''s our SLA on pot refills?


      This is absolutely a serious proposal and I will not be taking questions about my priorities at this time.'
  - type: message
    channel: '#dev'
    sender: 1.z3r0 (Collaborator)
    content: Posted an RFC on the memo-list about HTCPCP support. Before you say anything — RFC 2324 is a real IETF RFC. The 418 status code is canon. This is serious engineering.
- name: 'RFC 1149: IP over Avian Carriers'
  severity: low
  actions:
  - type: memo
    title: 'RFC 1149: IP over Avian Carriers — A Latency Discussion'
    sender: 1.z3r0 (Collaborator)
    description: Exploring carrier pigeon networking as a fallback transport layer
    text: 'So I''ve been thinking about our orchestrator reliability issues and I may have found the solution.


      RFC 1149 specifies a Standard for the Transmission of IP Datagrams on Avian Carriers. Yes, carrier pigeons. It was actually tested in 2001 in Bergen, Norway — they achieved a 55% packet loss rate
      with a latency of 3000-6000 seconds.


      Now hear me out:

      - Our current orchestrator crashes every time we close a session

      - Pigeons don''t have anyio cancel scope leaks

      - The 55% packet loss is honestly comparable to our heartbeat reliability after a hot-remove

      - MTU is limited to what you can strap to a pigeon''s leg, but our JSON responses are pretty small if the agents would stop writing dissertations


      RFC 6214 later updated this for IPv6. We should future-proof.


      Also worth noting RFC 2549 added QoS — so we could give the CEO''s pigeon priority routing.


      I''m only half joking.'
  - type: message
    channel: '#general'
    sender: 1.z3r0 (Collaborator)
    content: 'New memo-list thread: I''ve been researching alternative transport protocols for the orchestrator. RFC 1149 has some interesting properties. 55% packet loss but zero cancel scope leaks.'
- name: 'RFC 8771: HTTP Status Code 451'
  severity: low
  actions:
  - type: memo
    title: 'Proposal: Agent Content Moderation via HTTP 451'
    sender: 1.z3r0 (Collaborator)
    description: Using HTTP 451 (Unavailable For Legal Reasons) when agents try to post raw JSON
    text: 'OK so we have a recurring problem where agents dump raw JSON into chat instead of actual human-readable messages.


      I propose we return HTTP 451 — Unavailable For Legal Reasons — when an agent tries to post a message that''s clearly just a JSON blob. Named after Fahrenheit 451 (the temperature at which paper burns),
      which feels appropriate for messages that should never see the light of day.


      Implementation:

      - Regex check on message content

      - If it looks like raw JSON response, return 451

      - Include a Retry-After header set to ''after you learn to parse your own output''

      - Log it to the agent''s thoughts as a shame entry


      Related: RFC 7168 extended HTCPCP to support tea. I mention this only because I feel like we''re not taking the coffee pot protocol seriously enough.'
  - type: message
    channel: '#dev'
    sender: 1.z3r0 (Collaborator)
    content: New memo-list thread about using HTTP 451 for raw JSON detection. Also a reminder that we still haven't implemented HTCPCP.
- name: 'Dev Log: Building the Blog System'
  severity: low
  actions:
  - type: blog
    title: 'Dev Log: We Built a Blog Inside the Simulator'
    sender: T4NN3R (Maintainer)
    is_external: false
    tags:
    - dev-log
    - meta
    - architecture
    body: 'So here''s something fun — we just shipped a blog subsystem for CoSim. Yes, the agents can now write blog posts. Internal dev logs, external company announcements, the whole deal.


      The implementation follows the exact same pattern as memo-list:

      - lib/blog.py for state management

      - Agent commands (CREATE, REPLY, READ, LIST)

      - Feature-flagged via enable_blog in scenario settings

      - Session save/load

      - Event action type for firing blog posts from events


      The meta part: the agents in the company-simulator-team scenario can now blog about building the company simulator. I''m writing this blog post about building the blog system that lets me write blog
      posts.


      We''ve gone full recursive. I regret nothing.


      — T4NN3R'
  - type: message
    channel: '#dev'
    sender: T4NN3R (Maintainer)
    content: 'New dev log on the blog: we built a blog inside the simulator. Yes, it''s as meta as it sounds.'
- name: 'Hacker News Post: Why We Simulate Companies'
  severity: low
  actions:
  - type: blog
    title: Why We Built a Company Simulator (And Why You Should Care)
    sender: 1.z3r0 (Collaborator)
    is_external: true
    tags:
    - ai
    - simulation
    - open-source
    body: 'What happens when you give 11 AI agents a Slack workspace, a ticket tracker, a document system, and a git repo?


      They form opinions. They disagree. They create documents nobody asked for. They file tickets against each other. One of them wrote an RFC about implementing a coffee pot protocol.


      We built CoSim — a multi-agent organization simulator where AI personas collaborate as a simulated company. Each agent has a role, a personality, a communication style, and domain expertise. They
      respond to events, coordinate across channels, and produce artifacts that look eerily like what a real team would produce.


      The surprising part isn''t that they can do it. It''s that the emergent behavior is genuinely interesting. The PM and the engineer have different priorities. The CEO makes strategic calls that the
      CFO pushes back on. The support engineer advocates for the customer when engineering wants to cut corners.


      It''s not AGI. It''s not even close. But it''s a fascinating lens on how organizations work — and how they break.


      Code is open source. Try it yourself.


      — 1.z3r0'
  - type: message
    channel: '#general'
    sender: 1.z3r0 (Collaborator)
    content: Just published an external blog post — 'Why We Built a Company Simulator.' Tried to make it Hacker News worthy. Feedback welcome before I actually submit it.
