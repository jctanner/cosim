events:
  - name: "Production Outage"
    severity: "critical"
    actions:
      - type: "message"
        channel: "#general"
        sender: "PagerDuty (System)"
        content: "ALERT: Production is DOWN. API returning 500 errors across all endpoints. Customer-facing services affected."
      - type: "ticket"
        title: "URGENT: Production outage — all endpoints returning 500"
        description: "PagerDuty triggered. Multiple services returning 500 errors. Customer impact confirmed. Requires immediate investigation."
        priority: "critical"
        author: "PagerDuty (System)"
      - type: "message"
        channel: "#support-external"
        sender: "Support Bot (System)"
        content: "We're aware of an issue affecting service availability. Our team is actively investigating. We'll provide updates as we have them."

  - name: "Angry Customer Escalation"
    severity: "high"
    actions:
      - type: "message"
        channel: "#support-external"
        sender: "Karen (Customer)"
        content: "Your checkout page has been broken for 2 HOURS. We're losing thousands in sales. Fix this NOW or we're switching to your competitor by end of week."
      - type: "ticket"
        title: "Customer escalation: Karen from Acme Corp — checkout broken"
        description: "Karen from Acme Corp reports checkout has been non-functional for 2 hours. Threatening to switch providers. Revenue impact estimated at $50K+."
        priority: "critical"
        author: "Karen (Customer)"

  - name: "New Compliance Policy"
    severity: "high"
    actions:
      - type: "message"
        channel: "#general"
        sender: "Legal (System)"
        content: "NOTICE: New data retention compliance requirements have been issued by legal, effective immediately. All teams must review the policy document in the shared folder."
      - type: "document"
        title: "Q2 Data Retention Compliance Requirements"
        folder: "shared"
        content: "# Q2 Data Retention Compliance Requirements\n\n## Effective Immediately\n\n1. All API endpoints must implement rate limiting\n2. User data must be encrypted at rest\n3. Session tokens must expire after 24 hours\n4. Audit logs must be retained for 90 days\n\n## Deadline\n\nAll changes must be implemented by end of quarter.\n\n## Consequences\n\nNon-compliance may result in regulatory fines up to $500K."
        author: "Legal (System)"

  - name: "Dependency Vulnerability"
    severity: "medium"
    actions:
      - type: "message"
        channel: "#engineering"
        sender: "GitHub Advisory (System)"
        content: "Security Advisory: flask-cors v3.x has a known vulnerability (CVE-2024-1234, CVSS 7.5). Upgrade to v4.0+ recommended. This affects our customer-api service."

  - name: "Competitor Launch"
    severity: "medium"
    actions:
      - type: "message"
        channel: "#sales"
        sender: "Google Alert (System)"
        content: "COMPETITOR NEWS: AcmeTech just launched a new product that directly competes with our core offering. They're pricing 20% below us and claiming 2x the performance. Three of our prospects have already asked about it."

  - name: "New Enterprise Lead"
    severity: "low"
    actions:
      - type: "message"
        channel: "#sales-external"
        sender: "BigCorp (Customer)"
        content: "Hi, we're evaluating solutions for our 10,000-seat enterprise deployment. Can you walk us through your platform capabilities, pricing model, and SLA guarantees? We have a decision deadline of 30 days."

  - name: "CEO Quarterly Update"
    severity: "low"
    actions:
      - type: "email"
        sender: "Dana (CEO)"
        subject: "Q2 Company Update — Growth, Goals, and What's Next"
        body: "Team,\n\nI wanted to share some exciting updates as we close out Q2.\n\nRevenue is up 35% QoQ. We've onboarded 12 new enterprise customers. Our NPS score hit 72, up from 58 last quarter.\n\nBut we have work to do. Churn in the mid-market segment is concerning. Support ticket volume is up 40% and response times are slipping. We need to invest in our support tooling and process.\n\nPriorities for Q3:\n1. Reduce support response time to under 4 hours\n2. Launch the enterprise dashboard\n3. Close the Series B (more on this soon)\n\nI'm proud of what we're building. Let's keep pushing.\n\n— Dana"

  - name: "Flexible Work Policy & Equipment Stipend"
    severity: "medium"
    actions:
      - type: "email"
        sender: "HR (System)"
        subject: "Flexible Work Policy & Equipment Stipend — Updated Guidelines"
        body: "All,\n\nWe're formalizing our flexible work policy. The short version: we trust you.\n\nWork from wherever you're most productive — home, office, coffee shop, moon base. There is no minimum in-office requirement. Come in when it makes sense for collaboration, team events, or because you want to.\n\nThe office is always available and stocked with good coffee. We encourage teams to find their own rhythm.\n\nTo support your remote setup, we're offering an annual equipment stipend of $2,000. This covers:\n\n- External monitors, keyboards, mice\n- Webcams, microphones, headsets\n- Ring lights, boom arms, camera rigging\n- Standing desks or ergonomic chairs\n- Any other gear that improves your workspace\n\nSubmit receipts through Expensify — no pre-approval needed. If you need something beyond the stipend, talk to your manager.\n\nWe want you comfortable and productive, wherever you are.\n\n— Human Resources"

  - name: "Mandatory Compliance Training"
    severity: "medium"
    actions:
      - type: "email"
        sender: "Compliance (System)"
        subject: "REQUIRED: Annual Security Awareness Training — Due by March 15"
        body: "All team members,\n\nIt's that time of year. Annual Security Awareness Training is now available and MANDATORY for all employees.\n\nTopics covered:\n- Phishing and social engineering\n- Data handling and classification\n- Incident reporting procedures\n- Password and access management\n\nDeadline: March 15, 2026\n\nFailure to complete by the deadline will result in access restrictions.\n\nAccess the training at: training.internal/security-2026\n\n— Compliance Team"

  - name: "Engineering Blog: Q2 Shipping Update"
    severity: "low"
    actions:
      - type: "blog"
        title: "Q2 Shipping Update: What We Built This Quarter"
        sender: "Marcus (Eng Manager)"
        is_external: false
        tags: ["engineering", "quarterly-update"]
        body: "Team,\n\nQuick recap of what the engineering team shipped in Q2:\n\n1. API rate limiting — per-key limits with sliding window counters\n2. Customer dashboard v2 — real-time metrics, export to CSV\n3. SSO integration — SAML 2.0 support for enterprise customers\n4. Infrastructure — migrated to multi-region deployment\n\nBiggest wins: rate limiting reduced abuse by 40%, dashboard v2 cut support tickets by 25%.\n\nBiggest miss: we didn't ship the webhook system. Pushed to Q3.\n\nLet's discuss priorities for Q3 in the comments.\n\n— Marcus"
      - type: "message"
        channel: "#engineering"
        sender: "Marcus (Eng Manager)"
        content: "Posted a Q2 shipping update on the engineering blog. Would love everyone's input on Q3 priorities."

  - name: "Company Blog: Introducing Our API"
    severity: "low"
    actions:
      - type: "blog"
        title: "Introducing the StreamLine API: Build Integrations in Minutes"
        sender: "Riley (Marketing)"
        is_external: true
        tags: ["product", "api", "launch"]
        body: "We're excited to announce the public release of the StreamLine API.\n\nWith our REST API, you can:\n- Create and manage projects programmatically\n- Automate workflows with webhooks\n- Build custom dashboards with real-time data\n- Integrate with your existing tools\n\nOur API is designed for developers, by developers. Full documentation, client libraries in Python, Node.js, and Go, and a generous free tier.\n\nGet started at docs.streamline.io/api\n\nWe can't wait to see what you build."
      - type: "message"
        channel: "#marketing"
        sender: "Riley (Marketing)"
        content: "Just published the API launch blog post on the external blog. Can everyone take a look and make sure the messaging is on point?"

settings:
  enable_background_tasks: true
  max_concurrent_tasks: 3
  task_timeout: 600
  enable_memos: true
  enable_blog: true
  task_allowed_tools:
    - Bash
    - Read
    - Write
    - Edit
    - WebFetch
    - WebSearch
