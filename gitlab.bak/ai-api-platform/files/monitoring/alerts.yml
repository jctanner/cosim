groups:
  - name: audit_trail
    interval: 30s
    rules:
      # Alert when audit writes to PostgreSQL are failing
      - alert: AuditWriteFailureRate
        expr: |
          rate(audit_write_failures_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
          component: audit
          team: devops
        annotations:
          summary: "Audit trail writes failing for {{ $labels.customer_id }}"
          description: "{{ $value | humanizePercentage }} of audit writes are failing. Data loss risk - check Loki logs for recovery."
          runbook_url: "https://docs.internal/runbooks/audit-failure-recovery"

      # Alert when any audit write fails (immediate alert, no rate threshold)
      - alert: AuditWriteFailure
        expr: |
          increase(audit_write_failures_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
          component: audit
          team: devops
        annotations:
          summary: "Audit write failed for customer {{ $labels.customer_id }}"
          description: "At least one audit record failed to write. Check structured logs in Loki for audit_data."

      # Alert when Redis budget updates are failing
      - alert: RedisBudgetUpdateFailureRate
        expr: |
          rate(redis_budget_update_failures_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          component: budget
          team: devops
        annotations:
          summary: "Redis budget tracking failing"
          description: "{{ $value | humanizePercentage }} of Redis budget updates are failing. Budget enforcement may be inaccurate."

      # Alert when database connection pool is exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          db_connection_pool_size - db_connection_pool_available < 2
        for: 1m
        labels:
          severity: warning
          component: database
          team: devops
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "Only {{ $value }} connections available. May cause audit write failures."

  - name: data_integrity
    interval: 5m
    rules:
      # Periodic check: compare request counts between Redis and PostgreSQL
      # This detects data loss that may have occurred during outages
      - alert: AuditDataIntegrityGap
        expr: |
          abs(
            sum(increase(llm_requests_total[1h]))
            -
            sum(increase(postgres_audit_records_inserted[1h]))
          ) > 10
        for: 5m
        labels:
          severity: warning
          component: audit
          team: devops
        annotations:
          summary: "Audit trail integrity gap detected"
          description: "{{ $value }} records difference between request count and audit records. Run reconciliation script."
          recovery_script: "/scripts/reconcile_audit_trail.py"
