apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: openai-api-key
  namespace: ai-api-platform-prod
spec:
  encryptedData:
    # This is a sealed/encrypted version of the actual OpenAI API key
    # The SealedSecrets controller in the cluster will decrypt it at runtime
    # Actual key value is stored securely in secrets management, not in git
    OPENAI_API_KEY: 
  template:
    metadata:
      name: openai-api-key
      namespace: ai-api-platform-prod
    type: Opaque
