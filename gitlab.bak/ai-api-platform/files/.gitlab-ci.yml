stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}
  IMAGE_LATEST: ${CI_REGISTRY_IMAGE}:latest

# Run tests
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir -r requirements.txt
    - pip install pytest pytest-cov pytest-asyncio
  script:
    - pytest tests/ -v --cov=app --cov-report=term --cov-report=xml:coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# Lint and type checking
lint:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir ruff mypy
    - pip install --no-cache-dir -r requirements.txt
  script:
    - ruff check app/
    - mypy app/ --ignore-missing-imports
  allow_failure: true

# Build and push Docker image
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME -t $IMAGE_LATEST .
    - docker push $IMAGE_NAME
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop

# Deploy to staging (auto)
deploy:staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context staging
    - kubectl set image deployment/ai-api-platform api-server=$IMAGE_NAME -n ai-api-staging
    - kubectl rollout status deployment/ai-api-platform -n ai-api-staging --timeout=5m
  environment:
    name: staging
    url: https://api-staging.example.com
  only:
    - develop

# Deploy to production (manual)
deploy:production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context production
    - kubectl set image deployment/ai-api-platform api-server=$IMAGE_NAME -n ai-api-prod
    - kubectl rollout status deployment/ai-api-platform -n ai-api-prod --timeout=5m
  environment:
    name: production
    url: https://api.example.com
  when: manual
  only:
    - main